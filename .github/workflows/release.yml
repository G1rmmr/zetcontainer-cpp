name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            archive_name: zetcontainer-ubuntu.tar.gz
          - os: macos-latest
            archive_name: zetcontainer-macos.tar.gz
          - os: windows-latest
            archive_name: zetcontainer-windows.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Cache Xmake Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            ~/.local/share/xmake
            ~/AppData/Local/.xmake
          key: ${{ runner.os }}-xmake-release-${{ hashFiles('**/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-xmake-release-

      - name: Configure Build
        run: xmake config --mode=release --yes

      - name: Build Library
        run: xmake -y zet

      - name: Package Output
        run: |
          xmake package -o build/packed
        shell: bash

      # Compress package folder
      - name: Compress Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path build/packed/* -DestinationPath build/${{ matrix.archive_name }}

      - name: Compress Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf build/${{ matrix.archive_name }} -C build/packed .

      - name: Create and Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ matrix.archive_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
