name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Setup xmake environment
    - name: Setup Xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest

    # Cache xmake dependencies (like doctest) for speed
    - name: Cache Xmake Packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.xmake
          ~/.local/share/xmake
          AppData/Local/.xmake
        key: ${{ runner.os }}-xmake-${{ hashFiles('**/xmake.lua') }}
        restore-keys: |
          ${{ runner.os }}-xmake-

    # Configure the build (debug mode is best for running tests)
    - name: Configure Build
      run: xmake config --mode=debug --yes

    # Compile the static library and tests
    - name: Build Targets
      run: xmake

    # Run unit tests and show detailed output
    - name: Run Tests
      run: xmake test --verbose
